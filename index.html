<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --laranja: #FF6100;
    --laranja-suave: #FFF0E6;
    --preto: #111111;
    --cinza-escuro: #333333;
    --cinza-medio: #888888;
    --cinza-claro: #F5F5F5;
    --branco: #FFFFFF;
    --borda: #E8E8E8;
    --sombra: 0 2px 16px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cinza-claro);
    color: var(--preto);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--preto);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--laranja);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--branco);
    letter-spacing: -1px;
    white-space: nowrap;
  }
  .logo span { color: var(--laranja); }

  .search-bar {
    flex: 1;
    max-width: 460px;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 16px 10px 42px;
    border-radius: 8px;
    border: none;
    background: #222;
    color: var(--branco);
    font-size: 0.9rem;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: background 0.2s;
  }
  .search-bar input::placeholder { color: #666; }
  .search-bar input:focus { background: #2a2a2a; }
  .search-bar svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #666;
  }

  .tag-shopee {
    background: var(--laranja);
    color: var(--branco);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 6px;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }

  /* HERO FAIXA */
  .hero-bar {
    background: var(--laranja-suave);
    border-bottom: 1px solid #FFD4B5;
    padding: 10px 20px;
    text-align: center;
  }
  .hero-bar p {
    font-size: 0.85rem;
    color: var(--laranja);
    font-weight: 600;
  }

  /* FILTROS */
  .filtros-wrap {
    max-width: 1200px;
    margin: 24px auto 0;
    padding: 0 20px;
  }
  .filtros-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--cinza-medio);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .filtros {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filtro-btn {
    padding: 7px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--borda);
    background: var(--branco);
    font-size: 0.82rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    color: var(--cinza-escuro);
    transition: all 0.15s;
  }
  .filtro-btn:hover { border-color: var(--laranja); color: var(--laranja); }
  .filtro-btn.ativo {
    background: var(--laranja);
    border-color: var(--laranja);
    color: var(--branco);
  }

  /* RESULTADOS */
  .resultados-info {
    max-width: 1200px;
    margin: 20px auto 0;
    padding: 0 20px;
    font-size: 0.82rem;
    color: var(--cinza-medio);
  }

  /* GRID */
  .grid {
    max-width: 1200px;
    margin: 16px auto 40px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 18px;
  }

  /* CARD */
  .card {
    background: var(--branco);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--sombra);
    display: flex;
    flex-direction: column;
    transition: transform 0.18s, box-shadow 0.18s;
    border: 1px solid var(--borda);
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.13);
  }

  .card-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #f9f9f9;
    overflow: hidden;
  }
  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }
  .card:hover .card-img-wrap img { transform: scale(1.04); }

  .badge-comissao {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--laranja);
    color: var(--branco);
    font-size: 0.68rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 0.3px;
  }
  .badge-vendas {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
  }

  .card-body {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .card-categoria {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--laranja);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .card-nome {
    font-size: 0.87rem;
    font-weight: 500;
    color: var(--cinza-escuro);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-loja {
    font-size: 0.74rem;
    color: var(--cinza-medio);
  }

  .card-footer {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .card-preco {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--preto);
  }

  .btn-comprar {
    display: inline-block;
    background: var(--laranja);
    color: var(--branco);
    font-size: 0.78rem;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
    font-family: 'Inter', sans-serif;
  }
  .btn-comprar:hover { background: #E05500; transform: scale(1.03); }

  /* VAZIO */
  .vazio {
    text-align: center;
    padding: 60px 20px;
    color: var(--cinza-medio);
    display: none;
    grid-column: 1 / -1;
  }
  .vazio svg { margin-bottom: 12px; opacity: 0.4; }
  .vazio p { font-size: 0.95rem; }

  /* FOOTER */
  footer {
    background: var(--preto);
    color: #555;
    text-align: center;
    padding: 28px 20px;
    font-size: 0.78rem;
    line-height: 1.6;
    margin-top: 20px;
  }
  footer a { color: var(--laranja); text-decoration: none; }

  /* MOBILE */
  @media (max-width: 600px) {
    .header-inner { gap: 10px; }
    .logo { font-size: 1.25rem; }
    .tag-shopee { display: none; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .card-nome { font-size: 0.8rem; }
    .card-preco { font-size: 0.95rem; }
    .btn-comprar { font-size: 0.72rem; padding: 7px 10px; }
  }
</style>

let categoriaAtiva = "TODOS";

// Gera filtros
function gerarFiltros() {
  const cats = ["TODOS", ...new Set(produtos.map(p => p.categoria))];
  const cont = document.getElementById("filtros");
  cats.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "filtro-btn" + (cat === "TODOS" ? " ativo" : "");
    btn.textContent = cat === "TODOS" ? "Todos" : cat.charAt(0) + cat.slice(1).toLowerCase();
    btn.onclick = () => {
      document.querySelectorAll(".filtro-btn").forEach(b => b.classList.remove("ativo"));
      btn.classList.add("ativo");
      categoriaAtiva = cat;
      filtrar();
    };
    cont.appendChild(btn);
  });
}

function filtrar() {
  const busca = document.getElementById("busca").value.toLowerCase();
  const filtrados = produtos.filter(p => {
    const matchCat = categoriaAtiva === "TODOS" || p.categoria === categoriaAtiva;
    const matchBusca = p.nome.toLowerCase().includes(busca) || p.loja.toLowerCase().includes(busca);
    return matchCat && matchBusca;
  });
  renderCards(filtrados);
}

function renderCards(lista) {
  const grid = document.getElementById("grid");
  const vazio = document.getElementById("vazio");
  const info = document.getElementById("info-resultados");

  // remove cards antigos mas mantém o vazio
  grid.querySelectorAll(".card").forEach(c => c.remove());

  info.textContent = lista.length + (lista.length === 1 ? " produto encontrado" : " produtos encontrados");

  if (lista.length === 0) {
    vazio.style.display = "block";
    return;
  }
  vazio.style.display = "none";

  lista.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    const vendaLabel = p.vendas === "1000+" ? "🔥 +1000 vendidos" : p.vendas > 100 ? `⭐ ${p.vendas} vendidos` : p.vendas > 0 ? `${p.vendas} vendidos` : "";

    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="${p.img}" alt="${p.nome}" loading="lazy" onerror="this.src='https://placehold.co/300x300/f5f5f5/cccccc?text=Produto'">
        <span class="badge-comissao">${p.comissao}</span>
        ${vendaLabel ? `<span class="badge-vendas">${vendaLabel}</span>` : ""}
      </div>
      <div class="card-body">
        <div class="card-categoria">${p.categoria}</div>
        <div class="card-nome">${p.nome}</div>
        <div class="card-loja">🏪 ${p.loja}</div>
        <div class="card-footer">
          <div class="card-preco">${p.preco}</div>
          <a href="${p.link}" target="_blank" rel="noopener" class="btn-comprar">Ver oferta →</a>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

gerarFiltros();
filtrar();
</script>
